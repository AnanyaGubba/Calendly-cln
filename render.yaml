services:
  - type: web
    name: calendly-clone
    env: python
    plan: free
    buildCommand: |
      cd frontend
      npm install
      npm run build
      cd ../backend
      pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Calendly Clone API
      - key: FRONTEND_URL
        sync: false
      - key: DEFAULT_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_URL
        sync: false
